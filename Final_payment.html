<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aurora Travels | Secure Payment Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffd369; --accent: #3399cc; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #0306b1, #210368); 
            color: #fff; 
            min-height: 100vh; 
            padding: 40px 0; 
        }

        .nav-header { 
            display: flex; 
            align-items: center; 
            padding: 0 10%; 
            margin-bottom: 30px; 
        }
        .logo-circle { 
            width: 65px; height: 65px; 
            border-radius: 50%; 
            border: 2px solid var(--primary); 
            overflow: hidden; 
            background: #fff; 
            margin-right: 15px; 
        }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .main-container { 
            display: grid; 
            grid-template-columns: 1.4fr 0.9fr; 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }

        .payment-box, .summary-box { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        h2 { color: var(--primary); margin-bottom: 25px; font-size: 1.4rem; border-left: 4px solid var(--primary); padding-left: 15px; }

        /* Payment Methods */
        .method-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .method-card { 
            background: rgba(255,255,255,0.05); 
            padding: 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: 0.3s; 
            text-align: center;
        }
        .method-card:hover { background: rgba(255,255,255,0.1); }
        .method-card.active { border-color: var(--accent); background: rgba(51, 153, 204, 0.15); }

        /* Dynamic Form Fields */
        .details-form { display: none; background: rgba(0,0,0,0.2); padding: 25px; border-radius: 15px; margin-top: 10px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--primary); opacity: 0.9; }
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 15px; 
            border-radius: 8px; border: none; background: #fff; color: #333; font-size: 1rem; 
        }
        .card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .pay-btn { 
            width: 100%; padding: 20px; background: var(--accent); color: #fff; 
            border: none; border-radius: 50px; font-weight: 700; font-size: 1.1rem; 
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .pay-btn:hover { background: #287a9e; transform: scale(1.02); }

        /* Summary Styling */
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1rem; }
        .total-row { 
            border-top: 1px solid rgba(255,255,255,0.2); 
            padding-top: 20px; margin-top: 20px; 
            font-size: 1.5rem; font-weight: 700; color: var(--primary); 
        }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="logo-circle"><img src="./aurora_logo.jpeg" alt="Aurora Travels Logo"></div>
    <h1>Aurora Travels</h1>
</div>

<div class="main-container">
    <div class="payment-box">
        <h2>Choose Payment Method</h2>
        <div class="method-list">
            <div class="method-card" id="card-opt" onclick="toggleForm('card', this)">💳 Debit / Credit Card</div>
            <div class="method-card" id="upi-opt" onclick="toggleForm('upi', this)">📱 UPI Transaction</div>
            <div class="method-card" id="amazon-opt" onclick="toggleForm('amazon', this)">🛒 AmazonPay</div>
            <div class="method-card" id="nb-opt" onclick="toggleForm('nb', this)">🏦 Net Banking</div>
        </div>

        <div id="form-card" class="details-form">
            <label>16-Digit Card Number</label>
            <input type="text" id="cardNum" placeholder="XXXX XXXX XXXX XXXX" maxlength="16">
            <div class="card-row">
                <div><label>PIN</label><input type="password" id="cardPin" placeholder="****" maxlength="4"></div>
                <div><label>CVV</label><input type="password" id="cardCvv" placeholder="***" maxlength="3"></div>
            </div>
        </div>

        <div id="form-upi" class="details-form">
            <label>Enter UPI ID</label>
            <input type="text" id="upiId" placeholder="example@upi">
        </div>

        <div id="form-amazon" class="details-form">
            <label>Amazon Associated Mobile / Email</label>
            <input type="text" id="amazonUser" placeholder="Mobile number or email">
        </div>

        <div id="form-nb" class="details-form">
            <label>Select Your Bank</label>
            <select id="bankSelect">
                <option value="">-- Select Bank --</option>
                <option>Axis Bank</option>
                <option>Bank of Baroda</option>
                <option>Canara Bank</option>
                <option>Cosmos Bank</option>
                <option>HDFC Bank</option>
                <option>ICICI Bank</option>
                <option>Indian Bank</option>
                <option>SBI Bank</option>
                <option>Karnataka Bank</option>
            </select>
        </div>

        <button class="pay-btn" onclick="executePayment()">Confirm & Proceed</button>
    </div>

    <div class="summary-box">
        <h2>Fare Summary</h2>
        <div class="summary-item"><span>Passenger</span> <strong id="sumName">--</strong></div>
        <div class="summary-item"><span>Destination</span> <strong id="sumDest">--</strong></div>
        <div class="summary-item"><span>Travelers</span> <strong id="sumCount">1</strong></div>
        <div class="summary-item"><span>Base Fare</span> <span id="sumBase">₹0</span></div>
        <div class="summary-item"><span>Taxes & GST (5%)</span> <span id="sumTax">₹0</span></div>
        <div class="summary-item total-row"><span>Total Amount</span> <span id="sumTotal">₹0</span></div>
    </div>
</div>
<script>
    let selectedMethod = "";

    function toggleForm(method, element) {
        selectedMethod = method;
        document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.details-form').forEach(f => f.style.display = 'none');
        
        element.classList.add('active');
        document.getElementById('form-' + method).style.display = 'block';
    }

    window.onload = function() {
        const name = localStorage.getItem('fullName') || "Guest";
        const dest = localStorage.getItem('destCity') || "Not Selected";
        const base = parseInt(localStorage.getItem('basePrice')) || 0;
        const count = parseInt(localStorage.getItem('numPassengers')) || 1;
        
        const totalBase = base * count;
        const tax = Math.round(totalBase * 0.05);
        const grandTotal = totalBase + tax;

        document.getElementById('sumName').innerText = name;
        document.getElementById('sumDest').innerText = dest;
        document.getElementById('sumCount').innerText = count;
        document.getElementById('sumBase').innerText = "₹" + totalBase.toLocaleString('en-IN');
        document.getElementById('sumTax').innerText = "₹" + tax.toLocaleString('en-IN');
        document.getElementById('sumTotal').innerText = "₹" + grandTotal.toLocaleString('en-IN');
    };

    function executePayment() {
        if (!selectedMethod) {
            alert("Please select a payment method first.");
            return;
        }

        let isSuccess = false;

        // FIXED VALIDATION LOGIC
        if (selectedMethod === 'card') {
            const card = document.getElementById('cardNum').value;
            const pin = document.getElementById('cardPin').value;
            const cvv = document.getElementById('cardCvv').value;
            if (card.length >= 15 && pin.length >= 3 && cvv.length >= 3) isSuccess = true;
        } 
        else if (selectedMethod === 'upi') {
            const upi = document.getElementById('upiId').value;
            if (upi.length > 3) isSuccess = true; // Simple check for any text
        } 
        else if (selectedMethod === 'amazon') {
            const amz = document.getElementById('amazonUser').value;
            if (amz.length > 3) isSuccess = true;
        } 
        else if (selectedMethod === 'nb') {
            const bank = document.getElementById('bankSelect').value;
            if (bank !== "") isSuccess = true;
        }

        if (isSuccess) {
            const bId = localStorage.getItem("currentBookingId");
            
            fetch('https://aurora-travels.onrender.com/api/payment-success', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    bookingId: bId, 
                    method: selectedMethod 
                })
            })
            .then(response => {
                localStorage.setItem("paymentSuccess", "true");
                alert("Payment Successful via " + selectedMethod.toUpperCase());
                window.location.href = "ticket.html";
            })
            .catch(err => {
                console.error("Server connection failed, but proceeding for UI demo.");
                window.location.href = "ticket.html";
            });
        } else {
            alert("Please enter the required details for " + selectedMethod.toUpperCase());
        }
    }
</script>
</body>
</html>
